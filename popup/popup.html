<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Trail</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .status-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    
    .status-dot.active {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }
    
    .status-text {
      font-size: 13px;
      color: #aaa;
    }
    
    .status-text.active {
      color: #4ade80;
    }
    
    .help-text {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      line-height: 1.5;
    }
    
    .shortcut {
      background: #333;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      background: #4a9eff;
      color: #fff;
      transition: background 0.15s;
    }
    
    .btn:hover {
      background: #5aafff;
    }
    
    .btn:disabled {
      background: #444;
      color: #666;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 20px;">🛤️</span>
    <h1>Prompt Trail</h1>
  </div>
  
  <div class="status-card">
    <div class="status-row">
      <div class="status-indicator">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Not on ChatGPT</span>
      </div>
    </div>
  </div>
  
  <button class="btn" id="toggle-btn" disabled>Toggle Sidebar</button>
  
  <p class="help-text">
    Keyboard shortcut: <span class="shortcut">Ctrl+Shift+P</span><br><br>
    Navigate to ChatGPT to see your prompt timeline. Click any prompt to scroll to it in the conversation.
  </p>

  <script src="popup.js"></script>
</body>
</html>
